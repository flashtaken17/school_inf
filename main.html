<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моя сторінка</title>
</head>
<body>

<div>
    <img id="currentPhoto" src="img/1.png" alt="Фото">
</div>

<button id="nextButton">NEXT</button>

<script>
    // Налаштування
    var photosCount = 3;
    var currentPhotoIndex = 1;

    // Функція для зміни зображення
    function changeImage() {
        currentPhotoIndex++;
        if (currentPhotoIndex > photosCount) currentPhotoIndex = 1;

        var elem = document.getElementById("currentPhoto");
        elem.src = "img/" + currentPhotoIndex + ".png";
    }

    // Прив’язка кнопки після завантаження елементів
    var button = document.getElementById("nextButton");
    button.addEventListener('click', changeImage);
</script>

</body>
</html>
